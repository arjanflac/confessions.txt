<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />

    </style>
    <title>Verify — CONFESSIONS.txt</title>

    <meta name="author" content="Arjan" />

    <meta property="og:url" content="https://confessionstxt.art/verify" />

    <link rel="canonical" href="https://confessionstxt.art/verify" />
    <script type="application/ld+json">

        "@context": "https://schema.org",

        "description": "Resolve a published Base TX Hash into an auditable evidence trail.",
        "isPartOf": {
          "@type": "WebSite",
          "name": "CONFESSIONS.txt",
          "url": "https://confessionstxt.art/"
        },
        "creator": {
          "@type": "Person",
          "name": "Arjan",
          "alternateName": "arjan.flac"
        }
      }
    </script>
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="stylesheet" href="brand-fonts.css" />
    <style>
      :root {
        --bg: #09090b;
        --surface-1: #121214;
        --surface-2: #1a1a1d;
        --surface-3: rgba(26, 26, 29, 0.84);
        --border: #242329;
        --border-soft: rgba(255, 255, 255, 0.07);
        --text-1: #ece7df;
        --text-2: #b7afa2;
        --text-3: #776d62;
        --label-1: #a09386;
        --label-2: #84786c;
        --accent: #c2685f;
        --accent-dim: #7b342f;
        --positive: #6dcf8e;
        --warning: #d8a45e;

        --font-title: "Clash Grotesk", "Helvetica Neue", Arial, sans-serif;
        --font-body: "Clash Grotesk", "Helvetica Neue", Arial, sans-serif;
        --font-tech: "Nippo", "Courier New", monospace;

        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-xl: 22px;
      }

      @view-transition {
        navigation: auto;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        color: var(--text-1);
        font-family: var(--font-body);
        line-height: 1.54;
        background:
          radial-gradient(circle at 8% -14%, rgba(194, 104, 95, 0.09), transparent 37%),
          radial-gradient(circle at 92% 2%, rgba(194, 104, 95, 0.05), transparent 42%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.015), transparent 36%),
          linear-gradient(var(--bg), var(--bg));
        position: relative;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      body::before {
        content: none;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      .shell {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 2rem 1.35rem 2.5rem;
        padding-top: max(2rem, env(safe-area-inset-top, 0px));
        padding-bottom: max(2.5rem, env(safe-area-inset-bottom, 0px));
        display: grid;
        gap: 1rem;
        position: relative;
        z-index: 1;
        opacity: 0;
        animation: riseIn 0.42s ease forwards;
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .nav {
        display: flex;
        align-items: center;
        width: 100%;
        max-width: 54rem;
        margin: 0 auto;
      }

      .nav-home {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        color: var(--label-1);
        text-decoration: none;
        font-family: var(--font-tech);
        font-size: 0.68rem;
        font-weight: 560;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        transition: color 0.15s ease;
      }

      .nav-home::before {
        content: "\2190";
        font-size: 1rem;
      }

      .nav-home:hover {
        color: var(--text-1);
      }

      .nav-home:focus-visible {
        outline: 2px solid var(--text-3);
        outline-offset: 4px;
      }

      .card {
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        overflow: hidden;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
        width: 100%;
        max-width: 54rem;
        margin: 0 auto;
      }

      .masthead {
        position: relative;
      }

      .masthead::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 88% 14%, rgba(196, 109, 97, 0.12), transparent 24%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.01), transparent 45%);
        pointer-events: none;
      }

      .masthead-meta {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.8rem;
        flex-wrap: wrap;
        padding: 0.85rem 1.15rem;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }

      .revision-line,
      .case-line {
        font-family: var(--font-tech);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--label-1);
      }

      .masthead-main {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 1rem;
        align-items: center;
        padding: 1.35rem 1.15rem 1.4rem;
        position: relative;
        z-index: 1;
      }

      .logo-frame {
        width: 84px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }

      .logo-frame img {
        width: 100%;
        height: auto;
      }

      .title-group {
        display: grid;
        gap: 0.32rem;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .title {
        font-family: var(--font-title);
        font-size: clamp(2.15rem, 5vw, 3.9rem);
        font-weight: 560;
        letter-spacing: -0.05em;
        line-height: 0.94;
      }

      .lede {
        max-width: 40rem;
        color: var(--text-2);
        font-size: 1rem;
        line-height: 1.72;
      }

      .input-panel {
        display: grid;
        gap: 0.9rem;
        padding: 1.15rem;
      }

      .input-panel-head {
        display: grid;
        gap: 0.3rem;
      }

      .input-label {
        display: block;
        font-family: var(--font-tech);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--label-1);
      }

      .input-support {
        color: var(--text-3);
        font-size: 0.94rem;
      }

      .input-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.7rem;
      }

      .input-field {
        width: 100%;
        min-width: 0;
        padding: 1rem 1.05rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: rgba(7, 7, 9, 0.85);
        color: var(--text-1);
        font-family: var(--font-tech);
        font-size: 0.9rem;
        line-height: 1.45;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .input-field::placeholder {
        color: var(--text-3);
      }

      .input-field:focus {
        outline: none;
        border-color: rgba(196, 109, 97, 0.8);
        box-shadow: 0 0 0 3px rgba(196, 109, 97, 0.12);
      }

      .submit-btn {
        padding: 1rem 1.35rem;
        border: 1px solid var(--accent);
        border-radius: var(--radius-md);
        background: transparent;
        color: var(--accent);
        font-family: var(--font-tech);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.15s ease, background-color 0.15s ease;
        white-space: nowrap;
      }

      .submit-btn:hover {
        transform: translateY(-1px);
        background: rgba(196, 109, 97, 0.1);
      }

      .submit-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .input-note {
        color: var(--label-2);
        font-size: 0.76rem;
      }

      .console {
        min-height: 420px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent 14%), var(--surface-1);
      }

      .console-empty {
        display: grid;
        place-items: center;
        min-height: 420px;
        padding: 1.4rem;
        text-align: center;
        color: var(--text-3);
        font-size: 0.96rem;
        font-style: italic;
      }

      .console-content {
        padding: 1.1rem;
      }

      .status-panel {
        display: inline-block;
        position: relative;
        margin-bottom: 1rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.48rem 0.98rem;
        font-family: var(--font-tech);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        border: 1px solid;
        border-radius: 999px;
        margin-bottom: 0;
        position: relative;
      }

      .status.has-tip {
        cursor: help;
        user-select: none;
      }

      .status.has-tip:focus-visible {
        outline: 2px solid var(--text-3);
        outline-offset: 3px;
      }

      .status.verified {
        background: rgba(196, 109, 97, 0.08);
        border-color: rgba(196, 109, 97, 0.38);
        color: #d97a74;
      }

      .status.verified .status-icon {
        color: var(--positive);
      }

      .status.error {
        background: rgba(216, 164, 94, 0.1);
        border-color: rgba(216, 164, 94, 0.45);
        color: var(--warning);
      }

      .status.warning,
      .status.loading {
        background: rgba(255, 255, 255, 0.03);
        border-color: var(--border);
        color: var(--text-2);
      }

      .status-icon {
        font-size: 0.88rem;
        line-height: 1;
      }

      .status-tooltip {
        position: absolute;
        left: 0;
        top: calc(100% + 0.55rem);
        z-index: 12;
        width: min(38rem, calc(100vw - 2.4rem));
        max-width: min(38rem, calc(100vw - 2.4rem));
        padding: 1rem 1.06rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: #111114;
        color: #b6b6c2;
        font-family: var(--font-body);
        font-size: 0.92rem;
        font-weight: 520;
        line-height: 1.52;
        letter-spacing: normal;
        text-transform: none;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
        opacity: 0;
        visibility: hidden;
        transform: translateY(4px);
        transition: opacity 0.14s ease, transform 0.14s ease, visibility 0.14s ease;
        pointer-events: none;
      }

      .status-tooltip::before {
        content: "";
        position: absolute;
        top: -6px;
        left: 18px;
        width: 10px;
        height: 10px;
        background: #111114;
        border-left: 1px solid var(--border);
        border-top: 1px solid var(--border);
        transform: rotate(45deg);
      }

      .status.has-tip:hover .status-tooltip,
      .status.has-tip:focus-visible .status-tooltip,
      .status.has-tip.is-open .status-tooltip {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .record-shell {
        display: grid;
        gap: 1rem;
        width: 100%;
        max-width: 54rem;
        margin: 0 auto;
      }

      .record-summary {
        color: var(--text-2);
        font-size: 0.98rem;
        line-height: 1.72;
        max-width: 68rem;
      }

      .record-layout {
        display: grid;
        grid-template-columns: minmax(0, 32.75rem) minmax(17.5rem, 20.25rem);
        justify-content: center;
        gap: 1rem;
        align-items: start;
      }

      .artifact-panel,
      .record-panel {
        min-width: 0;
      }

      .artifact-panel {
        min-width: 0;
      }

      .record-topline {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.7rem;
        padding: 0.8rem 0.95rem;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }

      .panel-label {
        font-family: var(--font-tech);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--label-1);
      }

      .artifact-stage {
        padding: 0;
        background: none;
      }

      .artifact-frame {
        display: grid;
        justify-items: center;
        gap: 0.78rem;
        width: min(100%, 33.5rem);
        padding: 0;
        margin: 0 auto;
      }

      .artifact-header {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
      }

      .artifact-header .status-panel {
        margin-bottom: 0;
      }

      .artifact-image-wrap {
        position: relative;
        width: calc(100% - 0.4rem);
        overflow: hidden;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #0d0d0f;
        min-height: 0;
        display: grid;
        place-items: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.28);
      }

      .artifact-image {
        display: block;
        width: 100%;
        height: auto;
        max-height: none;
      }

      .artifact-placeholder {
        padding: 1.4rem;
        text-align: center;
        color: rgba(47, 42, 39, 0.72);
        font-family: var(--font-tech);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .artifact-caption {
        display: grid;
        gap: 0.18rem;
        width: calc(100% - 0.4rem);
        color: var(--text-1);
      }

      .artifact-title {
        font-family: var(--font-title);
        font-size: clamp(1.2rem, 2.2vw, 1.6rem);
        font-weight: 540;
        line-height: 1.1;
      }

      .artifact-meta {
        font-family: var(--font-tech);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--label-2);
      }

      .record-panel {
        display: grid;
        gap: 1rem;
      }

      .record-card {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface-2);
        overflow: hidden;
      }

      .record-body {
        padding: 0.95rem 1rem 1rem;
      }

      .record-copy {
        color: var(--text-2);
        font-size: 0.95rem;
        line-height: 1.68;
        font-weight: 440;
      }

      .data-grid {
        display: grid;
        gap: 0.75rem;
      }

      .data-block {
        padding-bottom: 0.82rem;
        border-bottom: 1px dashed var(--border-soft);
      }

      .data-block:last-child {
        padding-bottom: 0;
        border-bottom: none;
      }

      .data-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.34rem;
      }

      .data-actions {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .data-label {
        font-family: var(--font-tech);
        font-size: 0.66rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--label-1);
      }

      .copy-btn {
        padding: 0.28rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--text-2);
        font-family: var(--font-tech);
        font-size: 0.62rem;
        font-weight: 560;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease;
      }

      .copy-btn:hover {
        border-color: var(--text-3);
        color: var(--text-1);
        background: rgba(255, 255, 255, 0.04);
      }

      .copy-btn:focus-visible {
        outline: 2px solid var(--text-3);
        outline-offset: 2px;
      }

      .copy-btn.copied {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--text-3);
        color: var(--text-1);
      }

      .data-value {
        color: var(--text-1);
        font-size: 0.93rem;
        line-height: 1.62;
        font-weight: 440;
        word-break: break-word;
      }

      .data-value.mono,
      .data-value a {
        font-family: var(--font-tech);
        font-size: 0.82rem;
      }

      .data-value a {
        color: var(--label-1);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
      }

      .data-value a:hover {
        color: var(--text-1);
        border-bottom-color: var(--text-3);
      }

      .data-value.subtle {
        color: var(--label-2);
        font-size: 0.72rem;
      }

      .notes {
        margin-top: 1rem;
        padding: 0.9rem 0.95rem 0.95rem;
        border-left: 2px solid rgba(196, 109, 97, 0.28);
        background: rgba(255, 255, 255, 0.02);
        border-radius: 0 var(--radius-md) var(--radius-md) 0;
      }

      .notes-text {
        color: var(--text-2);
        font-size: 0.86rem;
        line-height: 1.7;
      }

      .steps-section {
        margin-top: 0.15rem;
      }

      .commands {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface-2);
        overflow: hidden;
      }

      .commands-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.7rem;
        padding: 0.72rem 0.95rem;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid var(--border);
      }

      .commands-label {
        font-family: var(--font-tech);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--label-1);
      }

      .commands pre {
        margin: 0;
        padding: 0.95rem;
        font-family: var(--font-tech);
        font-size: 0.74rem;
        line-height: 1.7;
        color: var(--text-2);
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .commands code {
        font-family: inherit;
        color: var(--text-1);
      }

      .commands .comment {
        color: var(--text-3);
      }

      .credit {
        margin-top: auto;
        padding-top: 0.2rem;
        text-align: center;
        font-family: var(--font-tech);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        color: var(--label-2);
      }

      .credit a {
        color: var(--label-1);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.15s ease, color 0.15s ease;
      }

      .credit a:hover {
        border-color: var(--text-3);
        color: var(--text-1);
      }

      @media (max-width: 980px) {
        .record-layout {
          grid-template-columns: 1fr;
        }

        .artifact-image {
          max-height: none;
        }
      }

      @media (max-width: 760px) {
        .shell {
          padding: 1.15rem 0.95rem 2rem;
          gap: 0.85rem;
        }

        .nav,
        .card,
        .record-shell {
          max-width: none;
        }

        .masthead-meta {
          padding: 0.72rem 0.95rem;
        }

        .masthead-main {
          grid-template-columns: 64px minmax(0, 1fr);
          gap: 0.8rem;
          padding: 1rem 0.95rem 1.15rem;
        }

        .logo-frame {
          width: 64px;
        }

        .lede {
          font-size: 0.96rem;
          line-height: 1.66;
        }

        .input-panel {
          padding: 0.95rem;
        }

        .input-row {
          grid-template-columns: 1fr;
        }

        .submit-btn {
          width: 100%;
        }

        .console {
          min-height: 320px;
        }

        .console-empty {
          min-height: 320px;
        }

        .console-content {
          padding: 0.95rem;
        }

        .artifact-stage,
        .record-body,
        .notes,
        .commands pre {
          padding-left: 0.9rem;
          padding-right: 0.9rem;
        }

        .artifact-image-wrap {
          width: 100%;
        }

        .artifact-header {
          width: 100%;
          padding: 0;
        }

        .artifact-caption {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav class="nav" aria-label="Breadcrumb">
        <a href="/" class="nav-home" data-smooth-nav>Return</a>
      </nav>

      <header class="masthead card">
        <div class="masthead-meta">
          <span class="revision-line">Protocol Verification Console</span>
        </div>
        <div class="masthead-main">
          <div class="logo-frame">
            <img src="logo.png" alt="" />
          </div>
          <div class="title-group">
            <h1 class="sr-only">Verify</h1>
            <p class="lede" data-pretext="left">Resolve a published Base TX Hash into an auditable evidence trail.</p>
          </div>
        </div>
      </header>

      <section class="input-panel card">
        <div class="input-panel-head">
          <label class="input-label" for="input">Artifact Locator</label>
        </div>
        <div class="input-row">
          <input
            id="input"
            class="input-field"
            type="text"
            placeholder="0x... transaction hash"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="verify" class="submit-btn">Resolve Artifact</button>
        </div>
        <p class="input-note">Runs locally in-browser.</p>
      </section>

      <section id="console" class="console card" aria-live="polite" aria-atomic="true">
        <div class="console-empty">awaiting locator</div>
      </section>

      <footer class="credit">via <a href="https://www.instagram.com/arjan.flac/" target="_blank" rel="noopener">@arjan.flac</a></footer>
    </main>

    <script src="page-transition.js"></script>
    <script>
      const consoleEl = document.getElementById("console");
      const inputEl = document.getElementById("input");
      const verifyBtn = document.getElementById("verify");

      let activePreviewObjectUrl = null;

      function releasePreviewUrl() {
        if (activePreviewObjectUrl) {
          URL.revokeObjectURL(activePreviewObjectUrl);
          activePreviewObjectUrl = null;
        }
      }

      function hexToAscii(hex) {
        const clean = hex.startsWith("0x") ? hex.slice(2) : hex;
        if (!clean || clean.length % 2 !== 0) return null;
        let text = "";
        for (let i = 0; i < clean.length; i += 2) {
          const byte = parseInt(clean.slice(i, i + 2), 16);
          if (Number.isNaN(byte)) return null;
          text += String.fromCharCode(byte);
        }
        return text;
      }

      function parseMetadata(text) {
        const fields = {};
        const parts = text.split("|");
        const hasPipeDelimitedLabel = parts.length > 1;
        for (let i = 0; i < parts.length; i += 1) {
          const part = parts[i];
          const trimmed = part.trim();
          if (!trimmed) continue;
          if (i === 0 && !fields.TITLE) {
            const looksLikeExplicitTitle = trimmed.toUpperCase().startsWith("TITLE:");
            const firstColon = trimmed.indexOf(":");
            const firstKey = firstColon === -1 ? "" : trimmed.slice(0, firstColon).trim().toUpperCase();
            const looksLikeKnownField = ["ARTXID", "AR", "CSHA", "STEG", "CID", "IPFS", "PROOF", "SHA", "HASH"].indexOf(firstKey) !== -1;
            const looksLikeFreeTitle = trimmed.indexOf(":") === -1;
            if ((hasPipeDelimitedLabel && !looksLikeKnownField) || looksLikeExplicitTitle || looksLikeFreeTitle) {
              fields.TITLE = looksLikeExplicitTitle ? trimmed.slice(trimmed.indexOf(":") + 1).trim() : trimmed;
              continue;
            }
          }
          const idx = part.indexOf(":");
          if (idx === -1) continue;
          const key = part.slice(0, idx).trim().toUpperCase();
          const value = part.slice(idx + 1).trim();
          if (key) fields[key] = value;
        }
        return fields;
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function safeId(value) {
        return String(value || "").replace(/[^a-zA-Z0-9_-]/g, "");
      }

      function shellQuote(value) {
        return "'" + String(value || "").replace(/'/g, "'\"'\"'") + "'";
      }

      function quoteTitle(title) {
        const clean = String(title || "").trim();
        if (!clean) return clean;
        const hasDoubleQuotes = clean.charAt(0) === '"' && clean.charAt(clean.length - 1) === '"';
        const hasSingleQuotes = clean.charAt(0) === "'" && clean.charAt(clean.length - 1) === "'";
        if (hasDoubleQuotes || hasSingleQuotes) return clean;
        return '"' + clean + '"';
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return null;
        if (bytes < 1024) return bytes + " B";
        const units = ["KB", "MB", "GB"];
        let value = bytes / 1024;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }
        return value.toFixed(value >= 100 ? 0 : value >= 10 ? 1 : 2) + " " + units[unitIndex];
      }

      function copyToClipboard(text, btn) {
        return (async function () {
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
            } else {
              const textarea = document.createElement("textarea");
              textarea.value = text;
              textarea.style.position = "fixed";
              textarea.style.opacity = "0";
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand("copy");
              document.body.removeChild(textarea);
            }
            const originalText = btn.textContent;
            btn.textContent = "Copied";
            btn.classList.add("copied");
            setTimeout(function () {
              btn.textContent = originalText;
              btn.classList.remove("copied");
            }, 2000);
          } catch (err) {
            console.error("Copy failed:", err);
          }
        })();
      }

      function renderStatus(text, type, tooltip) {
        const icons = {
          verified: "&#10003;",
          error: "&#10007;",
          warning: "&#9888;",
          loading: "&#8230;"
        };
        const hasTooltip = Boolean(tooltip);
        const tooltipHtml = hasTooltip ? '<span class="status-tooltip" role="tooltip">' + escapeHtml(tooltip) + "</span>" : "";
        const attrs = hasTooltip ? ' tabindex="0" role="button" aria-expanded="false"' : "";
        const classes = "status " + type + (hasTooltip ? " has-tip" : "");
        return '<div class="' + classes + '"' + attrs + '><span class="status-icon">' + (icons[type] || icons.loading) + "</span>" + escapeHtml(text) + tooltipHtml + "</div>";
      }

      function renderStatusPanel(text, type, tooltip) {
        return '<div class="status-panel">' + renderStatus(text, type, tooltip) + "</div>";
      }

      function renderDataBlock(label, value, options) {
        options = options || {};
        const copyValue = options.copyValue;
        const isLink = options.isLink;
        const mono = options.mono;
        const extra = options.extra;
        const copyBtn = copyValue
          ? '<button class="copy-btn" data-copy="' + escapeHtml(copyValue) + '" aria-label="Copy ' + escapeHtml(label) + '">Copy</button>'
          : "";
        const valueHtml = isLink
          ? '<a href="' + escapeHtml(value) + '" target="_blank" rel="noopener">' + escapeHtml(value) + "</a>"
          : escapeHtml(value);
        const monoClass = mono ? " mono" : "";
        const extraHtml = extra ? '<div class="data-value subtle">' + escapeHtml(extra) + "</div>" : "";
        return '<div class="data-block"><div class="data-header"><span class="data-label">' + escapeHtml(label) + '</span><div class="data-actions">' + copyBtn + "</div></div><div class=\"data-value" + monoClass + '">' + valueHtml + "</div>" + extraHtml + "</div>";
      }

      function renderArtifactRecordBlock(txid, canonicalUrl) {
        const items = [];
        if (canonicalUrl) {
          items.push(renderDataBlock("Permanent Archive (AR)", canonicalUrl, {
            isLink: true,
            copyValue: canonicalUrl,
            mono: true,
            extra: txid ? "TXID: " + txid : null
          }));
        } else if (txid) {
          items.push(renderDataBlock("Arweave TXID", txid, { copyValue: txid, mono: true }));
        }
        return items.join("");
      }

      function renderArtifactPanel(preview, title, statusHtml) {
        const artifactTitle = title ? quoteTitle(title) : "Artifact";
        const metaParts = [];
        if (preview && preview.dimensionsLabel) metaParts.push(preview.dimensionsLabel);
        if (preview && preview.sizeLabel) metaParts.push(preview.sizeLabel);
        if (preview && preview.contentType) metaParts.push(preview.contentType);
        const artifactMeta = metaParts.length ? metaParts.join(" • ") : "Preview unavailable";
        const imageHtml = preview && preview.objectUrl
          ? '<img class="artifact-image" src="' + escapeHtml(preview.objectUrl) + '" alt="' + escapeHtml("Resolved artifact preview for " + artifactTitle) + '" loading="eager" decoding="async" />'
          : '<div class="artifact-placeholder">Preview unavailable</div>';
        return '' +
          '<section class="artifact-panel">' +
            '<div class="artifact-stage">' +
              '<div class="artifact-frame">' +
                '<div class="artifact-header">' +
                  (statusHtml || "") +
                  '<span class="panel-label">Preview</span>' +
                "</div>" +
                '<div class="artifact-image-wrap">' + imageHtml + "</div>" +
                '<div class="artifact-caption">' +
                  '<div class="artifact-title" data-pretext="left">' + escapeHtml(artifactTitle) + "</div>" +
                  '<div class="artifact-meta">' + escapeHtml(artifactMeta) + "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</section>";
      }

      function renderAudit(commands) {
        if (!commands) return "";
        const escapedCommands = escapeHtml(commands).replace(/^(# .+)$/gm, '<span class="comment">$1</span>');
        return '' +
          '<section class="steps-section">' +
            '<div class="commands">' +
              '<div class="commands-header">' +
                '<span class="commands-label">Audit Commands</span>' +
                '<button class="copy-btn" data-copy="' + escapeHtml(commands) + '" aria-label="Copy commands">Copy</button>' +
              "</div>" +
              "<pre><code>" + escapedCommands + "</code></pre>" +
            "</div>" +
          "</section>";
      }

      function renderResolvedRecord(options) {
        const title = options.title;
        const txHash = options.txHash;
        const arTxid = options.arTxid;
        const canonicalUrl = options.canonicalUrl;
        const proofValue = options.proofValue;
        const stegValue = options.stegValue;
        const rawMetadata = options.rawMetadata;
        const commands = options.commands;
        const statusText = options.statusText;
        const statusType = options.statusType || "verified";
        const statusTooltip = options.statusTooltip;
        const preview = options.preview;
        const previewError = options.previewError;
        let html = '<div class="console-content"><div class="record-shell">';
        html += '<div class="record-layout">';
        html += renderArtifactPanel(preview, title, renderStatusPanel(statusText, statusType, statusTooltip));
        html += '<aside class="record-panel">';
        html += '<section class="record-card"><div class="record-topline"><span class="panel-label">Provenance Record</span></div><div class="record-body">';
        html += '<div class="data-grid">';
        if (title) {
          html += renderDataBlock("Title", quoteTitle(title));
        }
        if (txHash) {
          html += renderDataBlock("Base TX Hash", txHash, { copyValue: txHash, mono: true });
        }
        html += renderArtifactRecordBlock(arTxid, canonicalUrl);
        if (proofValue) {
          html += renderDataBlock("Proof (CSHA)", proofValue, { copyValue: proofValue, mono: true });
        }
        if (stegValue) {
          html += renderDataBlock("STEGO-PASS", stegValue, { copyValue: stegValue, mono: true });
        }
        html += "</div>";
        if (previewError) {
          html += '<div class="notes"><p class="notes-text">' + escapeHtml(previewError) + "</p></div>";
        }
        if (stegValue) {
          html += '<div class="notes"><p class="notes-text" data-pretext="left">Public STEG present. Extraction is public; plaintext remains sealed behind the age passphrase.</p></div>';
        }
        html += "</div></section></aside></div>";
        html += renderAudit(commands);
        html += "</div></div>";
        consoleEl.innerHTML = html;
        attachCopyHandlers();
      }

      function renderLegacy(cid, options) {
        releasePreviewUrl();
        options = options || {};
        const title = options.title;
        const checksum = options.checksum;
        const txHash = options.txHash;
        const rawMetadata = options.rawMetadata;
        const statusText = txHash ? "Legacy Protocol" : "Legacy Archive";
        const tooltip = "Legacy IPFS metadata detected. Current labels use ARTXID + CSHA.";
        let html = '<div class="console-content"><div class="record-shell">';
        html += renderStatusPanel(statusText, "warning", tooltip);
        html += '<div class="record-layout">';
        html += '<section class="artifact-panel"><div class="artifact-stage"><div class="artifact-frame"><div class="artifact-image-wrap"><div class="artifact-placeholder">IPFS metadata only</div></div><div class="artifact-caption"><div class="artifact-title" data-pretext="left">' + escapeHtml(title ? quoteTitle(title) : "Legacy record") + '</div><div class="artifact-meta">Pre-Arweave format</div></div></div></div></section>';
        html += '<aside class="record-panel"><section class="record-card"><div class="record-topline"><span class="panel-label">Legacy Provenance</span></div><div class="record-body"><div class="data-grid">';
        if (rawMetadata) {
          html += renderDataBlock("Decoded Label", rawMetadata, { copyValue: rawMetadata, mono: true });
        }
        if (title) {
          html += renderDataBlock("Title", quoteTitle(title));
        }
        if (txHash) {
          html += renderDataBlock("Base TX Hash", txHash, { copyValue: txHash, mono: true });
        }
        html += renderDataBlock("IPFS CID", cid, { copyValue: cid, mono: true });
        if (checksum) {
          html += renderDataBlock("Proof Hash", checksum, { copyValue: checksum, mono: true });
        }
        html += "</div></div></section></aside></div></div></div>";
        consoleEl.innerHTML = html;
        attachCopyHandlers();
      }

      function parseLegacyMetadata(text, parsedFields) {
        parsedFields = parsedFields || {};
        const normalized = String(text || "").replace(/\u0000/g, " ");
        const compact = normalized.replace(/\s+/g, " ").trim();
        let seededTitle = parsedFields.TITLE || null;
        if (seededTitle && /\b(?:cid|ipfs|proof|sha|hash|csha)\s*:/i.test(seededTitle)) {
          seededTitle = null;
        }
        const legacy = {
          title: seededTitle,
          cid: parsedFields.IPFS || parsedFields.CID || null,
          checksum: parsedFields.CSHA || parsedFields.PROOF || parsedFields.SHA || parsedFields.HASH || null
        };
        if (legacy.cid && /\s+\b(?:title|ipfs|cid|csha|proof|sha512|sha|hash)\s*:/i.test(legacy.cid)) {
          legacy.cid = null;
        }
        if (legacy.checksum && /\s+\b(?:title|ipfs|cid|csha|proof|sha512|sha|hash)\s*:/i.test(legacy.checksum)) {
          legacy.checksum = null;
        }

        const cidMatch = normalized.match(/\b(?:ipfs|cid)\s*:\s*([a-zA-Z0-9_-]+)/i);
        if (!legacy.cid && cidMatch) {
          legacy.cid = cidMatch[1];
        }

        const checksumMatch = normalized.match(/\b(?:csha|proof|sha512|sha|hash)\s*:\s*((?:0x)?[a-fA-F0-9]{32,128})/i);
        if (!legacy.checksum && checksumMatch) {
          legacy.checksum = checksumMatch[1];
        }

        const titleMatch = normalized.match(/\btitle\s*:\s*(.+?)(?=\s+\b(?:ipfs|cid|csha|proof|sha512|sha|hash)\s*:|$)/i);
        if (!legacy.title && titleMatch) {
          legacy.title = titleMatch[1].trim();
        }
        if (!legacy.title) {
          const firstField = compact.match(/\b(?:artxid|ar|ipfs|cid|csha|proof|sha512|sha|hash|steg)\s*:/i);
          if (firstField && typeof firstField.index === "number" && firstField.index > 0) {
            const prefix = compact.slice(0, firstField.index).replace(/[|,;:\-]+$/g, "").trim();
            if (prefix) {
              legacy.title = prefix;
            }
          }
        }

        return legacy;
      }

      function attachCopyHandlers() {
        const buttons = consoleEl.querySelectorAll("[data-copy]");
        buttons.forEach(function (btn) {
          btn.addEventListener("click", function () {
            const text = btn.getAttribute("data-copy");
            copyToClipboard(text, btn);
          });
        });
        attachStatusTooltipHandlers();
      }

      function useTapTooltipMode() {
        return window.matchMedia("(hover: none), (pointer: coarse)").matches;
      }

      function closeStatusTooltips(exceptEl) {
        const badges = consoleEl.querySelectorAll(".status.has-tip.is-open");
        badges.forEach(function (badge) {
          if (badge !== exceptEl) {
            badge.classList.remove("is-open");
            badge.setAttribute("aria-expanded", "false");
          }
        });
      }

      function attachStatusTooltipHandlers() {
        const badges = consoleEl.querySelectorAll(".status.has-tip");
        badges.forEach(function (badge) {
          badge.addEventListener("click", function (event) {
            if (!useTapTooltipMode()) return;
            event.stopPropagation();
            const isOpen = badge.classList.contains("is-open");
            closeStatusTooltips(badge);
            if (isOpen) {
              badge.classList.remove("is-open");
              badge.setAttribute("aria-expanded", "false");
            } else {
              badge.classList.add("is-open");
              badge.setAttribute("aria-expanded", "true");
            }
          });
          badge.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              const isOpen = badge.classList.contains("is-open");
              closeStatusTooltips(badge);
              if (isOpen) {
                badge.classList.remove("is-open");
                badge.setAttribute("aria-expanded", "false");
              } else {
                badge.classList.add("is-open");
                badge.setAttribute("aria-expanded", "true");
              }
            } else if (event.key === "Escape") {
              badge.classList.remove("is-open");
              badge.setAttribute("aria-expanded", "false");
              badge.blur();
            }
          });
          badge.addEventListener("blur", function () {
            if (!useTapTooltipMode()) {
              badge.classList.remove("is-open");
              badge.setAttribute("aria-expanded", "false");
            }
          });
        });
        if (!document.body.dataset.statusTooltipBound) {
          document.addEventListener("click", function () {
            if (!useTapTooltipMode()) return;
            closeStatusTooltips(null);
          });
          document.body.dataset.statusTooltipBound = "1";
        }
      }

      function scrollConsoleIntoView() {
        return;
      }

      function readImageDimensions(objectUrl) {
        return new Promise(function (resolve, reject) {
          const img = new Image();
          img.onload = function () {
            resolve({ width: img.naturalWidth, height: img.naturalHeight });
          };
          img.onerror = function () {
            reject(new Error("Image preview could not be decoded."));
          };
          img.src = objectUrl;
        });
      }

      function loadImageElement(objectUrl) {
        return new Promise(function (resolve, reject) {
          const img = new Image();
          img.onload = function () {
            resolve(img);
          };
          img.onerror = function () {
            reject(new Error("Image preview could not be decoded."));
          };
          img.src = objectUrl;
        });
      }

      function findTrimBounds(image) {
        const width = image.naturalWidth || image.width;
        const height = image.naturalHeight || image.height;
        if (!width || !height) return null;

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        if (!ctx) return null;

        ctx.drawImage(image, 0, 0);
        const { data } = ctx.getImageData(0, 0, width, height);
        const sampleStep = Math.max(1, Math.floor(Math.min(width, height) / 480));
        const maxCropX = Math.floor(width * 0.16);
        const maxCropY = Math.floor(height * 0.16);
        const darkThreshold = 16;
        const edgeRatio = 0.985;

        function isDarkPixel(index) {
          return data[index] <= darkThreshold &&
            data[index + 1] <= darkThreshold &&
            data[index + 2] <= darkThreshold &&
            data[index + 3] >= 245;
        }

        function mostlyDarkRow(y) {
          let dark = 0;
          let total = 0;
          for (let x = 0; x < width; x += sampleStep) {
            total += 1;
            if (isDarkPixel((y * width + x) * 4)) dark += 1;
          }
          return total > 0 && dark / total >= edgeRatio;
        }

        function mostlyDarkColumn(x) {
          let dark = 0;
          let total = 0;
          for (let y = 0; y < height; y += sampleStep) {
            total += 1;
            if (isDarkPixel((y * width + x) * 4)) dark += 1;
          }
          return total > 0 && dark / total >= edgeRatio;
        }

        let top = 0;
        while (top < maxCropY && mostlyDarkRow(top)) top += sampleStep;

        let bottom = height - 1;
        let bottomCrop = 0;
        while (bottomCrop < maxCropY && bottom >= 0 && mostlyDarkRow(bottom)) {
          bottom -= sampleStep;
          bottomCrop += sampleStep;
        }

        let left = 0;
        while (left < maxCropX && mostlyDarkColumn(left)) left += sampleStep;

        let right = width - 1;
        let rightCrop = 0;
        while (rightCrop < maxCropX && right >= 0 && mostlyDarkColumn(right)) {
          right -= sampleStep;
          rightCrop += sampleStep;
        }

        const cropLeft = Math.min(left, maxCropX);
        const cropTop = Math.min(top, maxCropY);
        const cropRight = Math.min(rightCrop, maxCropX);
        const cropBottom = Math.min(bottomCrop, maxCropY);

        if (cropLeft < sampleStep && cropTop < sampleStep && cropRight < sampleStep && cropBottom < sampleStep) {
          return null;
        }

        const croppedWidth = width - cropLeft - cropRight;
        const croppedHeight = height - cropTop - cropBottom;
        if (croppedWidth <= width * 0.6 || croppedHeight <= height * 0.6) {
          return null;
        }

        return {
          x: cropLeft,
          y: cropTop,
          width: croppedWidth,
          height: croppedHeight
        };
      }

      async function createTrimmedPreview(blob, originalUrl) {
        const sourceUrl = originalUrl || URL.createObjectURL(blob);
        try {
          const image = await loadImageElement(sourceUrl);
          const bounds = findTrimBounds(image);
          if (!bounds) {
            return sourceUrl;
          }

          const canvas = document.createElement("canvas");
          canvas.width = bounds.width;
          canvas.height = bounds.height;
          const ctx = canvas.getContext("2d");
          if (!ctx) {
            return sourceUrl;
          }

          ctx.drawImage(
            image,
            bounds.x,
            bounds.y,
            bounds.width,
            bounds.height,
            0,
            0,
            bounds.width,
            bounds.height
          );

          const trimmedBlob = await new Promise(function (resolve) {
            canvas.toBlob(resolve, blob.type || "image/jpeg", 0.96);
          });

          if (!trimmedBlob) {
            return sourceUrl;
          }

          URL.revokeObjectURL(sourceUrl);
          return URL.createObjectURL(trimmedBlob);
        } catch (error) {
          return sourceUrl;
        }
      }

      async function fetchArtifactPreview(txid) {
        const safeTxidValue = safeId(txid);
        const canonicalUrl = "https://arweave.net/" + safeTxidValue;
        const response = await fetch(canonicalUrl, { mode: "cors", cache: "default" });
        if (!response.ok) {
          throw new Error("Arweave artifact request failed with status " + response.status + ".");
        }

        const blob = await response.blob();
        const contentType = blob.type || response.headers.get("content-type") || "";
        const preview = {
          canonicalUrl: canonicalUrl,
          resolvedUrl: response.url || canonicalUrl,
          contentType: contentType,
          size: blob.size,
          sizeLabel: formatBytes(blob.size),
          dimensionsLabel: null,
          objectUrl: null
        };

        if (!/^image\//i.test(contentType)) {
          return preview;
        }

        const originalUrl = URL.createObjectURL(blob);
        const dimensions = await readImageDimensions(originalUrl);
        const objectUrl = await createTrimmedPreview(blob, originalUrl);
        preview.objectUrl = objectUrl;
        preview.dimensionsLabel = dimensions.width + " × " + dimensions.height + " px";
        return preview;
      }

      function renderLoading(message, detail) {
        releasePreviewUrl();
        consoleEl.innerHTML = '' +
          '<div class="console-content">' +
            renderStatusPanel(message, "loading", detail || "Resolving record.") +
            '<div class="record-shell">' +
              '<div class="record-layout">' +
                '<section class="artifact-panel">' +
                  '<div class="artifact-topline"><span class="panel-label">Artifact</span><span class="panel-label">Loading</span></div>' +
                  '<div class="artifact-stage"><div class="artifact-frame"><div class="artifact-image-wrap"><div class="artifact-placeholder">Preparing artifact view</div></div><div class="artifact-caption"><div class="artifact-title">Resolution in progress</div><div class="artifact-meta">Awaiting artifact data</div><p class="artifact-note">The artifact will appear here once retrieval completes.</p></div></div></div>' +
                "</section>" +
                '<aside class="record-panel"><section class="record-card"><div class="record-topline"><span class="panel-label">Catalog Record</span><span class="panel-label">Loading</span></div><div class="record-body"><div class="data-grid">' +
                  renderDataBlock("Status", detail || "Resolving...") +
                "</div></div></section></aside>" +
              "</div>" +
            "</div>" +
          "</div>";
      }

      async function renderArweave(txid) {
        const safeTxidValue = safeId(txid);
        const canonicalUrl = "https://arweave.net/" + safeTxidValue;
        renderLoading("Fetching Artifact", "Loading the artifact from Arweave.");

        let preview = null;
        let previewError = null;
        try {
          preview = await fetchArtifactPreview(safeTxidValue);
        } catch (err) {
          previewError = err.message || String(err);
        }

        releasePreviewUrl();
        if (preview && preview.objectUrl) {
          activePreviewObjectUrl = preview.objectUrl;
        }

        const commands = "# Download artifact\ncurl -fL -o locked_artifact.jpg \"" + canonicalUrl + "\"\n\n# Extract payload (requires HStego or confess CLI)\npython3 cli/confess.py extract --image locked_artifact.jpg --stego-pass \"<STEGO_PASS>\"\n\n# Verify checksum (if known)\npython3 cli/confess.py verify --file payload.age --csha <CSHA_SHA512>";
        renderResolvedRecord({
          statusText: "Artifact Located",
          statusType: "verified",
          statusTooltip: "Archive pointer resolved. Public carrier located in permanent storage, without accompanying on-chain label or proof material.",
          title: null,
          txHash: null,
          arTxid: safeTxidValue,
          canonicalUrl: canonicalUrl,
          proofValue: null,
          stegValue: null,
          rawMetadata: null,
          commands: commands,
          preview: preview,
          previewError: previewError
        });
        scrollConsoleIntoView();
      }

      async function verifyTx(txHash) {
          renderLoading("Querying Ledger", "Decoding the published label.");

        try {
          const payload = {
            jsonrpc: "2.0",
            id: 1,
            method: "eth_getTransactionByHash",
            params: [txHash]
          };
          const res = await fetch("https://mainnet.base.org", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await res.json();

          if (!data.result) {
            releasePreviewUrl();
            consoleEl.innerHTML = '<div class="console-content">' + renderStatusPanel("Not Found", "error", "Base mainnet returned no record for that hash.") + "</div>";
            attachCopyHandlers();
            return;
          }

          const inputHex = data.result.input;
          const ascii = hexToAscii(inputHex);
          const rawMetadata = String(ascii || "").replace(/\u0000/g, " ").trim();

          if (!ascii) {
            releasePreviewUrl();
            consoleEl.innerHTML = '<div class="console-content">' + renderStatusPanel("Unreadable", "error", "No readable artifact metadata was found in the transaction input.") + "</div>";
            attachCopyHandlers();
            return;
          }

          const fields = parseMetadata(ascii);
          const arField = fields.ARTXID || fields.AR;
          const legacy = parseLegacyMetadata(ascii, fields);

          if (!arField && legacy.cid) {
            renderLegacy(legacy.cid, {
              title: legacy.title,
              checksum: legacy.checksum,
              txHash: txHash,
              rawMetadata: rawMetadata
            });
            return;
          }

          if (!arField) {
            releasePreviewUrl();
            consoleEl.innerHTML = '<div class="console-content">' + renderStatusPanel("Unparsed", "warning", "Readable transaction input found, but it does not conform to a known artifact label.") + '<div class="data-grid">' + renderDataBlock("Raw Data", ascii, { mono: true, copyValue: ascii }) + "</div></div>";
            attachCopyHandlers();
            return;
          }

          const arId = safeId(arField);
          const canonicalUrl = "https://arweave.net/" + arId;
          const proofValue = String(fields.CSHA || fields.PROOF || "").trim();
          const cshaValue = /^[a-fA-F0-9]{128}$/.test(proofValue) ? proofValue : "<CSHA_SHA512>";
          const extractCommand = fields.STEG
            ? "python3 cli/confess.py extract --image locked_artifact.jpg --stego-pass " + shellQuote(fields.STEG)
            : 'python3 cli/confess.py extract --image locked_artifact.jpg --stego-pass "<STEGO_PASS>"';
          const commands = "# Download artifact\ncurl -fL -o locked_artifact.jpg \"" + canonicalUrl + "\"\n\n# Extract payload\n" + extractCommand + "\n\n# Verify checksum\npython3 cli/confess.py verify --file payload.age --csha " + cshaValue;

          renderLoading("Fetching Artifact", "Loading the artifact from Arweave.");

          let preview = null;
          let previewError = null;
          try {
            preview = await fetchArtifactPreview(arId);
          } catch (err) {
            previewError = err.message || String(err);
          }

          releasePreviewUrl();
          if (preview && preview.objectUrl) {
            activePreviewObjectUrl = preview.objectUrl;
          }

          const resolvedTip = fields.STEG
            ? "Protocol executed: confession written, sealed, and committed to permanent archive. Auditable via published pass and proof hash."
            : "Protocol executed: confession written, sealed, and committed to permanent archive. Auditable via archive pointer and proof hash.";

          renderResolvedRecord({
            statusText: "Resolved",
            statusType: "verified",
            statusTooltip: resolvedTip,
            title: fields.TITLE || null,
            txHash: txHash,
            arTxid: arId,
            canonicalUrl: canonicalUrl,
            proofValue: proofValue || null,
            stegValue: fields.STEG || null,
            rawMetadata: rawMetadata,
            commands: commands,
            preview: preview,
            previewError: previewError
          });
        } catch (err) {
          releasePreviewUrl();
          consoleEl.innerHTML = '<div class="console-content">' + renderStatusPanel("Error", "error", "Verification request failed. Network or resolver error.") + '<div class="data-grid">' + renderDataBlock("Details", err.message || String(err)) + "</div></div>";
        }
      }

      async function handleVerify() {
        const value = inputEl.value.trim();
        if (!value) return;

        const isTx = /^0x[a-fA-F0-9]{64}$/.test(value);
        const isIpfs = /^(bafy|bafk|Qm)/i.test(value);
        const isArTxid = /^[a-zA-Z0-9_-]{32,64}$/.test(value);

        if (isTx) {
          await verifyTx(value.toLowerCase());
        } else if (isIpfs) {
          renderLegacy(value);
        } else if (isArTxid) {
          await renderArweave(value);
        } else {
          releasePreviewUrl();
          consoleEl.innerHTML = '<div class="console-content">' + renderStatusPanel("Invalid Input", "error", "Enter a Base transaction hash, Arweave TXID, or legacy CID.") + "</div>";
        }
      }

      verifyBtn.addEventListener("click", function () {
        handleVerify();
      });

      inputEl.addEventListener("keydown", function (event) {
        if (event.key === "Enter") handleVerify();
      });

      const urlParams = new URLSearchParams(window.location.search);
      const txParam = urlParams.get("tx");
      const txidParam = urlParams.get("txid");
      if (txParam) {
        inputEl.value = txParam;
        handleVerify();
      } else if (txidParam) {
        inputEl.value = txidParam;
        handleVerify();
      }
    </script>
    <script type="module" src="pretext-balance.js"></script>
  </body>
</html>
